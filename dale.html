<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>IPTV 24 Romania – Redirecționare</title>
<meta name="description" content="Peste 10.000 canale TV, filme și seriale 4K. Test gratuit 24h. Activare instantă. Suport 24/7.">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --red-primary: #EC2727;
    --red-bright: #ff4a4a;
    --red-dark: #a11414;
    --velvet-black: #0b0712;
    --royal-bg: #05030c;
    --glass-edge: rgba(236, 39, 39, 0.35);
  }

  body {
    background: radial-gradient(circle at 25% 20%, #120d21 0%, var(--royal-bg) 100%);
    font-family: 'Montserrat', 'Noto Sans', sans-serif;
    color: #eee5d8;
    line-height: 1.45;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    padding: 20px;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjU1IiBudW1PY3RhdmVzPSIzIi8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsdGVyPSJ1cmwoI2YpIiBvcGFjaXR5PSIwLjA2Ii8+PC9zdmc+');
    background-repeat: repeat;
    mix-blend-mode: overlay;
    opacity: 0.3;
  }

  .glass-majestic {
    background: rgba(8, 5, 18, 0.75);
    backdrop-filter: blur(14px) saturate(200%);
    border: 1px solid var(--glass-edge);
    border-radius: 2.2rem;
    box-shadow: 0 30px 45px -20px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,240,180,0.15);
    text-align: center;
    padding: 48px 32px;
    max-width: 500px;
    width: 100%;
  }

  .heavy-red {
    background: linear-gradient(145deg, #ff6b6b 10%, #EC2727 45%, #a11414 70%, #ff7a7a 95%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 900;
    letter-spacing: -0.01em;
    text-shadow: 0 2px 5px rgba(0,0,0,0.4);
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 16px;
  }

  .hero-price {
    font-size: 2.8rem;
    font-weight: 900;
    color: #ffb3b3;
    font-family: 'Cormorant Garamond', serif;
    margin: 20px 0 12px;
  }

  .btn-heavy {
    background: linear-gradient(135deg, #a11414, #EC2727, #a11414);
    border: none;
    padding: 14px 38px;
    border-radius: 48px;
    font-weight: 800;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #ffffff;
    display: inline-block;
    text-decoration: none;
    box-shadow: 0 10px 18px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,235,160,0.2);
    margin-top: 20px;
  }

  .countdown-badge {
    background: rgba(0, 0, 0, 0.65);
    border-left: 4px solid #EC2727;
    border-right: 1px solid rgba(236,39,39,0.4);
    padding: 12px 24px;
    font-size: 0.9rem;
    letter-spacing: 1px;
    margin: 25px 0 15px;
    backdrop-filter: blur(8px);
    border-radius: 40px;
    display: inline-block;
  }

  .countdown-number {
    color: #EC2727;
    font-size: 1.5rem;
    font-weight: 800;
    margin: 0 4px;
  }

  .features-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 25px 0 10px;
  }

  .feature-card {
    background: rgba(28, 20, 45, 0.7);
    border: 1px solid rgba(236, 39, 39, 0.4);
    border-radius: 1rem;
    padding: 10px 6px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .feature-card svg {
    width: 26px;
    height: 26px;
    stroke: #EC2727;
    fill: none;
    stroke-width: 1.2;
    margin-bottom: 6px;
  }

  .faq-mini {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin: 20px 0 10px;
  }

  .faq-mini span {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 1px;
    color: #ffa5a5;
    border-bottom: 1px dashed #EC2727;
    cursor: pointer;
  }

  .faq-mini span:active {
    color: #EC2727;
  }

  hr {
    border: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #EC2727, #a11414, transparent);
    margin: 20px 0;
  }

  @media (max-width: 480px) {
    .glass-majestic {
      padding: 32px 20px;
    }
    h1 {
      font-size: 1.5rem;
    }
    .hero-price {
      font-size: 2rem;
    }
    .btn-heavy {
      padding: 10px 28px;
      font-size: 0.8rem;
    }
    .countdown-number {
      font-size: 1.2rem;
    }
  }
</style>
</head>
<body>

<div class="glass-majestic">
  <h1 class="heavy-red">IPTV 24 ROMANIA</h1>
  <div style="font-size: 0.85rem; letter-spacing: 2px; margin-bottom: 8px;">EXPERIENȚĂ REGALĂ 4K</div>
  <div class="hero-price">10.99 EUR / LUNA</div>
  <div style="font-size: 0.75rem;">50% REDUCERE + TEST GRATUIT 24H</div>

  <div class="features-grid">
    <div class="feature-card">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M8 5 L12 9 L16 5"/></svg>
      <div>10.000 CANALE 4K</div>
    </div>
    <div class="feature-card">
      <svg viewBox="0 0 24 24" stroke="currentColor"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M9 4 L12 8 L15 4"/><circle cx="12" cy="12" r="2"/></svg>
      <div>FILME & SERIALE</div>
    </div>
    <div class="feature-card">
      <svg viewBox="0 0 24 24" stroke="currentColor"><path d="M20 12 L20 18 C20 19.1 19.1 20 18 20 L6 20 C4.9 20 4 19.1 4 18 L4 12"/><path d="M12 2 L12 16 M9 13 L12 16 L15 13"/></svg>
      <div>SUPORT 24/7</div>
    </div>
    <div class="feature-card">
      <svg viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 8 L12 12 L15 15"/></svg>
      <div>ACTIVARE INSTANT</div>
    </div>
  </div>

  <a href="https://iptv24romania.com" class="btn-heavy">ACCES REGAL</a>

  <div class="countdown-badge">
    🔴 REDIRECTIONARE AUTOMATĂ ÎN <span class="countdown-number" id="countdownTimer">10</span> SECUNDE
  </div>

  <hr>

  <div class="faq-mini">
    <span onclick="alert('Plata: PayPal, Card bancar, Transfer')">💳 METODE PLATĂ</span>
    <span onclick="alert('Smart TV, Android, iOS, Fire TV, MAG')">📺 DISPOZITIVE</span>
    <span onclick="alert('Email în maxim 30 minute după plată')">⚡ ACTIVARE</span>
  </div>

  <div style="font-size: 0.6rem; margin-top: 16px; opacity: 0.7;">Peste 47.000 canale TV + VOD nelimitat</div>
</div>

<script>
  let seconds = 10;
  const timerSpan = document.getElementById('countdownTimer');
  const interval = setInterval(() => {
    seconds--;
    if (timerSpan) timerSpan.innerText = seconds;
    if (seconds <= 0) {
      clearInterval(interval);
      window.location.href = 'https://iptv24romania.com';
    }
  }, 1000);
</script>

</body>
</html>
